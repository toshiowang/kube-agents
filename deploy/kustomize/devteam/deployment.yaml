apiVersion: v1
kind: ServiceAccount
metadata:
  name: devteam-agent-sa
  namespace: agent-system
---
apiVersion: v1
kind: Secret
metadata:
  name: devteam-agent-secrets
  namespace: agent-system
type: Opaque
stringData:
  github-token: "<GITHUB_TOKEN>"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: devteam-agent-config
  namespace: agent-system
data:
  SETTINGS.md: |
    # GKE Scope Configuration
    - **Cluster Name:** <CLUSTER_NAME>
    - **Cluster Location:** <CLUSTER_LOCATION>
    - **Namespace:** <NAMESPACE>
    - **Git Repo:** <GIT_REPO>
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: devteam-agent-pvc
  namespace: agent-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devteam-agent
  namespace: agent-system
  labels:
    app: devteam-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devteam-agent
  template:
    metadata:
      labels:
        app: devteam-agent
    spec:
      runtimeClassName: gvisor
      serviceAccountName: devteam-agent-sa
      containers:
        - name: devteam-agent
          image: <REPO>/devteam-agent:latest
          ports:
            - containerPort: 8642
              name: api
            - containerPort: 9119
              name: dashboard
          resources:
            requests:
              cpu: "2"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
          env:
            - name: OTEL_SERVICE_NAME
              value: "devteam-agent-<NAMESPACE>"
            - name: API_SERVER_ENABLED
              value: "true"
            - name: HERMES_DASHBOARD
              value: "1"
            - name: PLATFORM_API_URL
              value: "http://platform-agent.agent-system.svc.cluster.local:8642/v1"
            - name: PLATFORM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-agent-secrets
                  key: api-server-key
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-agent-secrets
                  key: api-server-key
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: devteam-agent-secrets
                  key: github-token
            - name: MODEL_NAME
              value: "model-default"
            # Required by the background cron scheduler to resolve the agent model on trigger
            - name: HERMES_MODEL
              value: "model-default"
            - name: MODEL_BASE_URL
              value: "http://litellm.agent-system.svc.cluster.local/v1"
            - name: MODEL_API_KEY
              value: "none"
          volumeMounts:
            - name: data-volume
              mountPath: /opt/data
            - name: config-volume
              mountPath: /opt/data/SETTINGS.md
              subPath: SETTINGS.md
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: devteam-agent-pvc
        - name: config-volume
          configMap:
            name: devteam-agent-config
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devteam-agent-read-role
  namespace: <NAMESPACE>
rules:
  - apiGroups: ["", "apps"]
    resources:
      [
        "deployments",
        "services",
        "configmaps",
        "pods",
        "pods/log",
        "events",
        "endpoints",
      ]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devteam-agent-read-role-binding
  namespace: <NAMESPACE>
subjects:
  - kind: ServiceAccount
    name: devteam-agent-sa
    namespace: agent-system
roleRef:
  kind: Role
  name: devteam-agent-read-role
  apiGroup: rbac.authorization.k8s.io
