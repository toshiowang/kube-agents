apiVersion: v1
kind: ServiceAccount
metadata:
  name: <OPERATOR_AGENT_NAME>-sa
  namespace: agent-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: <OPERATOR_AGENT_NAME>-config
  namespace: agent-system
data:
  SETTINGS.md: |
    # GKE Scope Configuration
    - **Cluster Name:** <CLUSTER_NAME>
    - **Cluster Location:** <CLUSTER_LOCATION>
    - **Git Repo:** <GIT_REPO>
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: <OPERATOR_AGENT_NAME>-pvc
  namespace: agent-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: <OPERATOR_AGENT_NAME>
  namespace: agent-system
  labels:
    app: <OPERATOR_AGENT_NAME>
spec:
  replicas: 1
  selector:
    matchLabels:
      app: <OPERATOR_AGENT_NAME>
  template:
    metadata:
      labels:
        app: <OPERATOR_AGENT_NAME>
    spec:
      runtimeClassName: gvisor
      serviceAccountName: <OPERATOR_AGENT_NAME>-sa
      containers:
        - name: <OPERATOR_AGENT_NAME>
          image: <REPO>/operator-agent:latest
          ports:
            - containerPort: 8642
              name: api
            - containerPort: 9119
              name: dashboard
          resources:
            requests:
              cpu: "2"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
          env:
            - name: OTEL_SERVICE_NAME
              value: "<OPERATOR_AGENT_NAME>"
            - name: API_SERVER_ENABLED
              value: "true"
            - name: HERMES_DASHBOARD
              value: "1"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-agent-secrets
                  key: api-server-key
            - name: MODEL_NAME
              value: "model-default"
            - name: MODEL_BASE_URL
              value: "http://litellm.agent-system.svc.cluster.local/v1"
            - name: MODEL_API_KEY
              value: "none"
          volumeMounts:
            - name: data-volume
              mountPath: /opt/data
            - name: config-volume
              mountPath: /opt/data/SETTINGS.md
              subPath: SETTINGS.md
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: <OPERATOR_AGENT_NAME>-pvc
        - name: config-volume
          configMap:
            name: <OPERATOR_AGENT_NAME>-config
---
# --- Strict Read-Only Cluster Permissions ---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: <OPERATOR_AGENT_NAME>-cluster-role
rules:
  - apiGroups: [""]
    resources:
      [
        "nodes",
        "namespaces",
        "pods",
        "services",
        "events",
        "persistentvolumes",
        "serviceaccounts",
      ]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: <OPERATOR_AGENT_NAME>-cluster-role-binding
subjects:
  - kind: ServiceAccount
    name: <OPERATOR_AGENT_NAME>-sa
    namespace: agent-system
roleRef:
  kind: ClusterRole
  name: <OPERATOR_AGENT_NAME>-cluster-role
  apiGroup: rbac.authorization.k8s.io
