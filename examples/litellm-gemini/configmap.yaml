apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: agent-system
data:
  config.yaml: |
    model_list:
      - model_name: model-default
        litellm_params:
          model: gemini/gemini-3.1-flash-lite
          api_key: os.environ/GEMINI_API_KEY
    litellm_settings:
      callbacks: ["otel", "prometheus"]
