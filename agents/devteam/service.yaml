apiVersion: v1
kind: Service
metadata:
  name: devteam-agent
  namespace: agent-system
spec:
  selector:
    app: devteam-agent
  ports:
    - name: api
      protocol: TCP
      port: 8642
      targetPort: 8642
    - name: dashboard
      protocol: TCP
      port: 9119
      targetPort: 9119
  type: ClusterIP
