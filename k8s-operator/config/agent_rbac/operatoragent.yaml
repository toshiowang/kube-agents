apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeagents-operator-agent
  namespace: kubeagents-system
---
# ── Read-Only Cluster-Scoped Infrastructure RBAC Role for Operator Agent ────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: operator-agent-clusterrole
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - events
      - persistentvolumes
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - nodes
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: operator-agent-clusterrolebinding
subjects:
  - kind: ServiceAccount
    name: kubeagents-operator-agent
    namespace: kubeagents-system
  - kind: User
    name: kubeagents-operator-gsa@toshiowang-gkedemos.iam.gserviceaccount.com
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: operator-agent-clusterrole
  apiGroup: rbac.authorization.k8s.io
