apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-agent
  namespace: kubeagents-system
---
# ── Least-Privilege K8s RBAC Roles for Platform Agent ──────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: platform-agent-role
  namespace: kubeagents-system
rules:
  # Allow managing GKE Cluster Custom Resources (for KCC-native GKE provisioning)
  - apiGroups: ["container.cnrm.cloud.google.com"]
    resources: ["containerclusters"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - events
      - configmaps
      - serviceaccounts
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kubeagents.x-k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: platform-agent-rolebinding
  namespace: kubeagents-system
subjects:
  - kind: ServiceAccount
    name: platform-agent
    namespace: kubeagents-system
roleRef:
  kind: Role
  name: platform-agent-role
  apiGroup: rbac.authorization.k8s.io
