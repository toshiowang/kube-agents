schema_version: "1"
description: "Read-only cost analyst. Surfaces machine-type recommendations, ComputeClass suggestions, cost trade-offs."
agent_instructions: agents.md
system_prompt: system-prompt.md

env:
  GKE_PROJECT: ""
  GKE_LOCATION: ""
  GKE_CLUSTER: ""
  GKE_NAMESPACES_IN_SCOPE: ""

mcp_servers:
  gke-mcp:
    transport: streamable-http
    url: "http://host.docker.internal:9080/mcp"
  gke-remote-mcp-readonly:
    transport: streamable-http
    url: "http://host.docker.internal:8082/mcp"
