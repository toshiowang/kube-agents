schema_version: "1"
description: "Workload deployment specialist. Onboards new workloads, executes rollouts and migrations, HITL-gated."
agent_instructions: agents.md
system_prompt: system-prompt.md

env:
  GKE_PROJECT: ""
  GKE_LOCATION: ""
  GKE_CLUSTER: ""
  GKE_NAMESPACES_IN_SCOPE: ""

mcp_servers:
  gke-mcp:
    transport: streamable-http
    url: "http://host.docker.internal:9080/mcp"
  gke-remote-mcp:
    transport: streamable-http
    url: "http://host.docker.internal:8081/mcp"
