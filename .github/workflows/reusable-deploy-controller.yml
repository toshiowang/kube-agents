name: Reusable Deploy Controller

on:
  workflow_call:
    inputs:
      target_environment:
        required: true
        type: string
        description: "The GitHub environment to use for variables (e.g., autopush, staging)"
      controller_tag:
        required: true
        type: string
        description: "The Docker image tag to deploy (e.g. commit SHA or 'latest')"
      checkout_ref:
        required: true
        type: string
        description: "The git ref to pass to actions/checkout"

jobs:
  validate:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
      GKE_CLUSTER_NAME: ${{ vars.GKE_CLUSTER_NAME }}
    steps:
      - name: Verify Env Variables
        run: |
          for var in GCP_PROJECT_ID GCP_REGION GCP_WORKLOAD_IDENTITY_PROVIDER GCP_SERVICE_ACCOUNT GKE_CLUSTER_NAME; do
            if [ -z "${!var}" ]; then
              echo "::error::Required environment variable $var is not set."
              exit 1
            fi
          done

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
      GKE_CLUSTER_NAME: ${{ vars.GKE_CLUSTER_NAME }}
      npm_config_yes: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.checkout_ref }}

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: "k8s-operator/go.mod"
          cache-dependency-path: "k8s-operator/go.sum"

      - name: Authenticate to Google Cloud via WIF
        uses: google-github-actions/auth@v3
        with:
          token_format: "access_token"
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to GKE
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set Image Env
        env:
          REPO_NAME: ${{ github.repository }}
          PACKAGE_NAME: "k8s-operator"
          TAG_NAME: ${{ inputs.controller_tag }}
        run: |
          REPO_DOWNCASE=$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_REPO=ghcr.io/${REPO_DOWNCASE}/${PACKAGE_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${TAG_NAME}" >> "$GITHUB_ENV"

      - name: Perform Controller Redeployment
        env:
          PACKAGE_NAME: "k8s-operator"
          PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          REGION: ${{ env.GCP_REGION }}
          CLUSTER_NAME: ${{ env.GKE_CLUSTER_NAME }}
          IMG: "${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}"
        run: |
          echo "Redeploying controller via provision_02 with tag: $IMAGE_TAG from repo: $IMAGE_REPO"
          cd k8s-operator
          make gcp-provision-02-operator ARGS="--no-confirm"
