name: Docker Build

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Load tags
        run: cat tags.env >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build DevTeam Agent
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          target: devteam
          push: false
          tags: devteam-agent:latest
          build-args: |
            HERMES_AGENT_TAG=${{ env.HERMES_AGENT_TAG }}

      - name: Build Operator Agent
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          target: operator
          push: false
          tags: operator-agent:latest
          build-args: |
            HERMES_AGENT_TAG=${{ env.HERMES_AGENT_TAG }}

      - name: Build Platform Agent
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          target: platform
          push: false
          tags: platform-agent:latest
          build-args: |
            HERMES_AGENT_TAG=${{ env.HERMES_AGENT_TAG }}
