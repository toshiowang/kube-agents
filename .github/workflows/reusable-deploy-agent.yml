name: Reusable Deploy Agent

on:
  workflow_call:
    inputs:
      target_environment:
        required: true
        type: string
        description: "The GitHub environment to use for variables (e.g., autopush, staging)"
      agent_tag:
        required: true
        type: string
        description: "The Docker image tag to deploy (e.g. commit SHA or 'latest')"
      checkout_ref:
        required: true
        type: string
        description: "The git ref to pass to actions/checkout"

jobs:
  validate:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
      GKE_CLUSTER_NAME: ${{ vars.GKE_CLUSTER_NAME }}
      MODEL_DEFAULT_NAME: ${{ vars.MODEL_DEFAULT_NAME }}
      MODEL_PROVIDER: ${{ vars.MODEL_PROVIDER }}
      GOOGLE_CHAT_MODE: ${{ vars.GOOGLE_CHAT_MODE }}
      NAMESPACE: "kubeagents-system"
    steps:
      - name: Verify Env Variables
        run: |
          for var in GCP_PROJECT_ID GCP_REGION GCP_WORKLOAD_IDENTITY_PROVIDER GCP_SERVICE_ACCOUNT GKE_CLUSTER_NAME MODEL_DEFAULT_NAME MODEL_PROVIDER GOOGLE_CHAT_MODE; do
            if [ -z "${!var}" ]; then
              echo "::error::Required environment variable $var is not set."
              exit 1
            fi
          done

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
      GKE_CLUSTER_NAME: ${{ vars.GKE_CLUSTER_NAME }}
      MODEL_DEFAULT_NAME: ${{ vars.MODEL_DEFAULT_NAME }}
      MODEL_PROVIDER: ${{ vars.MODEL_PROVIDER }}
      GOOGLE_CHAT_ENABLED: ${{ vars.GOOGLE_CHAT_ENABLED }}
      GOOGLE_CHAT_MODE: ${{ vars.GOOGLE_CHAT_MODE }}
      CHAT_SUB_NAME: ${{ vars.CHAT_SUB_NAME }}
      CHAT_TOPIC_NAME: ${{ vars.CHAT_TOPIC_NAME }}
      ALLOWED_USERS: ${{ vars.ALLOWED_USERS }}
      SLACK_ENABLED: ${{ vars.SLACK_ENABLED }}
      SLACK_ALLOWED_USERS: ${{ vars.SLACK_ALLOWED_USERS }}
      SLACK_HOME_CHANNEL: ${{ vars.SLACK_HOME_CHANNEL }}
      SLACK_HOME_CHANNEL_NAME: ${{ vars.SLACK_HOME_CHANNEL_NAME }}
      NAMESPACE: "kubeagents-system"
      GITHUB_ORG: ${{ vars.GH_ORG }}
      GITHUB_REPO: ${{ vars.GH_REPO }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.checkout_ref }}

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: "k8s-operator/go.mod"
          cache-dependency-path: "k8s-operator/go.sum"

      - name: Authenticate to Google Cloud via WIF
        uses: google-github-actions/auth@v3
        with:
          token_format: "access_token"
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to GKE
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set Image Env
        env:
          REPO_NAME: ${{ github.repository }}
          PACKAGE_NAME: "platform-agent"
          TAG_NAME: ${{ inputs.agent_tag }}
        run: |
          REPO_DOWNCASE=$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')
          echo "AGENT_IMAGE=ghcr.io/${REPO_DOWNCASE}/${PACKAGE_NAME}" >> "$GITHUB_ENV"
          echo "AGENT_TAG=${TAG_NAME}" >> "$GITHUB_ENV"

      - name: Perform Agent Redeployment
        env:
          PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          REGION: ${{ env.GCP_REGION }}
          CLUSTER_NAME: ${{ env.GKE_CLUSTER_NAME }}
          AGENT_IMAGE: "${{ env.AGENT_IMAGE }}"
          AGENT_TAG: "${{ env.AGENT_TAG }}"
        run: |
          echo "Redeploying platform-agent via provision_07 with image: ${AGENT_IMAGE}:${AGENT_TAG}"
          cd k8s-operator
          make gcp-provision-07-deploy ARGS="--no-confirm"

      - name: Verify Agent Deployment Rollout
        run: |
          echo "Waiting for rollout of platform-agent-gateway deployment..."
          if ! kubectl rollout status deployment/platform-agent-gateway -n ${{ env.NAMESPACE }} --timeout=180s; then
            echo "::error::Rollout failed! Printing debug logs..."
            kubectl describe deployment/platform-agent-gateway -n ${{ env.NAMESPACE }} || true
            kubectl get pods -n ${{ env.NAMESPACE }} -l app=platform-agent-gateway || true
            kubectl describe pods -n ${{ env.NAMESPACE }} -l app=platform-agent-gateway || true
            kubectl logs -n ${{ env.NAMESPACE }} -l app=platform-agent-gateway --all-containers --tail=50 || true
            exit 1
          fi
